<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LumenDSP</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="control-bar">
      <div class="brand">
        <img class="brand-mark" src="assets/brand/app-icon.png" alt="" />
        <div class="brand-text">
          <span class="brand-lumen">LUMEN</span>
          <span class="brand-dsp">DSP</span>
        </div>
      </div>

      <div class="io-group">
        <div class="meter-col" id="input-meter" aria-label="Input meter"></div>
        <div class="knob-wrap mini" data-param="inputGain">
          <div class="knob knob-mini" id="knob-inputGain"></div>
          <div class="knob-label">INPUT</div>
          <div class="knob-value" id="val-inputGain">0.0 dB</div>
        </div>
      </div>

      <div class="gate-group">
        <button type="button" class="hw-toggle" id="noiseGateEnabled" aria-pressed="true" title="Gate">
          <img src="assets/signal-path/toggle-on.png" alt="" data-role="toggle-img" />
          <span>GATE</span>
        </button>
        <div class="knob-wrap mini" data-param="noiseGateThreshold">
          <div class="knob knob-mini" id="knob-noiseGateThreshold"></div>
          <div class="knob-label">THRESH</div>
          <div class="knob-value" id="val-noiseGateThreshold">-80.0 dB</div>
        </div>
      </div>

      <div class="preset-group">
        <select id="presetSelect" aria-label="Preset"></select>
        <input id="presetName" type="text" placeholder="Save as…" maxlength="64" />
        <button type="button" id="btnSave" class="btn">Save</button>
        <button type="button" id="btnLoad" class="btn">Load</button>
      </div>

      <div class="io-group out">
        <div class="knob-wrap mini" data-param="outputLevel">
          <div class="knob knob-mini" id="knob-outputLevel"></div>
          <div class="knob-label">OUTPUT</div>
          <div class="knob-value" id="val-outputLevel">0.0 dB</div>
        </div>
        <div class="meter-col" id="output-meter" aria-label="Output meter"></div>
        <button type="button" id="btnAudio" class="btn btn-accent">Audio</button>
      </div>
    </header>

    <section class="signal-path" id="signalPath" aria-label="Signal path"></section>

    <main class="workspace">
      <section class="card card-gate">
        <div class="card-head">
          <h2>Gate</h2>
          <button type="button" class="hw-toggle" id="noiseGateEnabledCard" aria-pressed="true">
            <img src="assets/signal-path/toggle-on.png" alt="" data-role="toggle-img" />
            <span>Engage</span>
          </button>
        </div>
        <div class="pedal-stage">
          <img class="pedal-art" src="assets/pedals/noise-gate-pedal.png" alt="Noise gate pedal" />
          <div class="knob-wrap overlay-knob" data-param="noiseGateThreshold" data-mirror="true">
            <div class="knob knob-main" id="knob-noiseGateThreshold-main"></div>
            <div class="knob-label">THRESH</div>
            <div class="knob-value" id="val-noiseGateThreshold-main">-80.0 dB</div>
          </div>
        </div>
      </section>

      <section class="card card-amp">
        <div class="card-head">
          <h2>Amp</h2>
          <span class="status" id="namStatus">No model</span>
        </div>
        <div class="amp-hero">
          <img src="assets/amp-head/amp-faceplate-hero.png" alt="Amp head" />
        </div>
        <div class="resource-row">
          <div>
            <div class="resource-title">NAM Model</div>
            <div class="resource-name" id="namName">None loaded</div>
          </div>
          <button type="button" id="btnBrowseNam" class="btn">Browse</button>
        </div>
        <div class="knob-row">
          <div class="knob-wrap" data-param="bassGain">
            <div class="knob knob-main" id="knob-bassGain"></div>
            <div class="knob-label">BASS</div>
            <div class="knob-value" id="val-bassGain">0.0 dB</div>
          </div>
          <div class="knob-wrap" data-param="midGain">
            <div class="knob" id="knob-midGain"></div>
            <div class="knob-label">MID</div>
            <div class="knob-value" id="val-midGain">0.0 dB</div>
          </div>
          <div class="knob-wrap" data-param="trebleGain">
            <div class="knob knob-main" id="knob-trebleGain"></div>
            <div class="knob-label">TREBLE</div>
            <div class="knob-value" id="val-trebleGain">0.0 dB</div>
          </div>
        </div>
        <button type="button" class="hw-toggle inline" id="eqEnabled" aria-pressed="true">
          <img src="assets/signal-path/toggle-on.png" alt="" data-role="toggle-img" />
          <span>EQ in path</span>
        </button>
      </section>

      <section class="card card-cab">
        <div class="card-head">
          <h2>Cabinet</h2>
          <button type="button" class="hw-toggle" id="cabEnabled" aria-pressed="true">
            <img src="assets/signal-path/toggle-on.png" alt="" data-role="toggle-img" />
            <span>On</span>
          </button>
        </div>
        <div class="cab-hero">
          <img id="cabArt" src="assets/cabinet/cab-1x12.jpg" alt="Cabinet" />
          <img class="cab-led" id="cabLed" src="assets/cabinet/cab-engaged.png" alt="" />
        </div>
        <div class="resource-row">
          <div>
            <div class="resource-title">Impulse Response</div>
            <div class="resource-name" id="irName">None loaded</div>
          </div>
          <button type="button" id="btnBrowseIr" class="btn">Browse</button>
        </div>
      </section>
    </main>

    <footer class="status-bar">
      <span id="footerStatus">Starting…</span>
      <span id="footerHint">LumenDSP · NAM</span>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
