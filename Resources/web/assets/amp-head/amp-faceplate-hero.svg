<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" fill="none">
  <defs>
    <linearGradient id="chassis" x1="20" y1="10" x2="620" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#323240"/>
      <stop offset="0.5" stop-color="#1c1c26"/>
      <stop offset="1" stop-color="#121218"/>
    </linearGradient>
    <linearGradient id="vent" x1="60" y1="30" x2="580" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0a0e"/>
      <stop offset="1" stop-color="#18181f"/>
    </linearGradient>
    <radialGradient id="tubeGlow" cx="50%" cy="50%" r="50%">
      <stop stop-color="#ffb070"/>
      <stop offset="0.55" stop-color="#ff8850" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#ff8850" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="knob" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#6a6a80"/>
      <stop offset="0.5" stop-color="#2a2a34"/>
      <stop offset="1" stop-color="#14141a"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="624" height="244" rx="14" fill="url(#chassis)" stroke="#454556" stroke-width="1.5"/>
  <path d="M8 26c0-10 8-18 18-18h580c10 0 18 8 18 18v18H8V26z" fill="#2a2a34" opacity="0.5"/>

  <!-- tube vent -->
  <rect x="40" y="36" width="560" height="96" rx="8" fill="url(#vent)" stroke="#2a2a34" stroke-width="1"/>
  <g stroke="#3a3a48" stroke-width="2.5" stroke-linecap="round" opacity="0.9">
    <path d="M56 52h528"/>
    <path d="M56 68h528"/>
    <path d="M56 84h528"/>
    <path d="M56 100h528"/>
    <path d="M56 116h528"/>
  </g>
  <g filter="url(#glow)" opacity="0.95">
    <ellipse cx="140" cy="84" rx="26" ry="16" fill="url(#tubeGlow)"/>
    <ellipse cx="240" cy="84" rx="26" ry="16" fill="url(#tubeGlow)"/>
    <ellipse cx="340" cy="84" rx="26" ry="16" fill="url(#tubeGlow)"/>
    <ellipse cx="440" cy="84" rx="26" ry="16" fill="url(#tubeGlow)"/>
    <ellipse cx="540" cy="84" rx="26" ry="16" fill="url(#tubeGlow)"/>
  </g>
  <g fill="#ffc090" fill-opacity="0.4">
    <ellipse cx="140" cy="84" rx="9" ry="20"/>
    <ellipse cx="240" cy="84" rx="9" ry="20"/>
    <ellipse cx="340" cy="84" rx="9" ry="20"/>
    <ellipse cx="440" cy="84" rx="9" ry="20"/>
    <ellipse cx="540" cy="84" rx="9" ry="20"/>
  </g>

  <!-- faceplate knobs -->
  <g>
    <circle cx="110" cy="190" r="20" fill="url(#knob)" stroke="#4a4a5c" stroke-width="1.2"/>
    <circle cx="110" cy="190" r="13" fill="#14141a"/>
    <rect x="107.5" y="174" width="5" height="12" rx="2.5" fill="#e8e8f0"/>
    <circle cx="110" cy="168" r="2" fill="#ff8850"/>

    <circle cx="180" cy="190" r="20" fill="url(#knob)" stroke="#4a4a5c" stroke-width="1.2"/>
    <circle cx="180" cy="190" r="13" fill="#14141a"/>
    <rect x="177.5" y="174" width="5" height="12" rx="2.5" fill="#e8e8f0"/>
    <circle cx="180" cy="168" r="2" fill="#ff8850"/>

    <circle cx="250" cy="190" r="20" fill="url(#knob)" stroke="#4a4a5c" stroke-width="1.2"/>
    <circle cx="250" cy="190" r="13" fill="#14141a"/>
    <rect x="247.5" y="174" width="5" height="12" rx="2.5" fill="#e8e8f0"/>
    <circle cx="250" cy="168" r="2" fill="#ff8850"/>
  </g>

  <!-- jewel LED -->
  <g filter="url(#glow)">
    <rect x="310" y="176" width="20" height="26" rx="3" transform="rotate(45 320 189)" fill="#ff8850"/>
    <rect x="314" y="180" width="12" height="16" rx="2" transform="rotate(45 320 189)" fill="#ffd0a0" opacity="0.55"/>
  </g>

  <!-- badge -->
  <rect x="400" y="168" width="170" height="42" rx="8" fill="#0e0e13" stroke="#3a3a48" stroke-width="1"/>
  <text x="485" y="187" text-anchor="middle" fill="#ff8850" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="800" letter-spacing="0.22em">LUMEN</text>
  <text x="485" y="202" text-anchor="middle" fill="#8e8ea4" font-family="system-ui,Segoe UI,sans-serif" font-size="10" font-weight="600" letter-spacing="0.32em">DSP</text>
</svg>
