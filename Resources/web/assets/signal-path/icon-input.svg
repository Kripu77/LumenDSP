<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="body" x1="10" y1="4" x2="38" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3a3a48"/>
      <stop offset="1" stop-color="#1c1c24"/>
    </linearGradient>
    <radialGradient id="led" cx="50%" cy="50%" r="50%">
      <stop stop-color="#ffb080"/>
      <stop offset="1" stop-color="#ff8850"/>
    </radialGradient>
  </defs>
  <!-- pedal body -->
  <rect x="11" y="6" width="26" height="36" rx="5" fill="url(#body)" stroke="#4a4a5c" stroke-width="1"/>
  <rect x="13" y="8" width="22" height="32" rx="3.5" fill="#14141a" fill-opacity="0.35"/>
  <!-- knob -->
  <circle cx="20" cy="16" r="5" fill="#2a2a34" stroke="#6a6a80" stroke-width="1"/>
  <rect x="19" y="12" width="2" height="5" rx="1" fill="#e8e8f0"/>
  <!-- LED -->
  <circle cx="30" cy="16" r="2.4" fill="url(#led)"/>
  <circle cx="30" cy="16" r="1" fill="#ffd0b0"/>
  <!-- footswitch -->
  <circle cx="24" cy="32" r="5.5" fill="#3a3a48" stroke="#6a6a80" stroke-width="1"/>
  <circle cx="24" cy="32" r="3" fill="#2a2a34"/>
</svg>
