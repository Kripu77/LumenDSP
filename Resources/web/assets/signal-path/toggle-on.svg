<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 32" fill="none">
  <defs>
    <linearGradient id="trackOn" x1="0" y1="0" x2="56" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3a2818"/>
      <stop offset="1" stop-color="#1a120e"/>
    </linearGradient>
    <linearGradient id="thumbOn" x1="28" y1="4" x2="50" y2="28" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffb080"/>
      <stop offset="0.45" stop-color="#ff8850"/>
      <stop offset="1" stop-color="#e86838"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-50%" width="160%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" width="54" height="30" rx="15" fill="url(#trackOn)" stroke="#ff8850" stroke-opacity="0.55" stroke-width="1.5"/>
  <rect x="4" y="4" width="48" height="24" rx="12" fill="#000000" fill-opacity="0.28"/>
  <!-- on pill -->
  <g filter="url(#glow)">
    <rect x="26" y="4" width="26" height="24" rx="12" fill="url(#thumbOn)"/>
    <rect x="30" y="8" width="18" height="6" rx="3" fill="#ffffff" fill-opacity="0.28"/>
  </g>
  <!-- tiny LED -->
  <circle cx="14" cy="16" r="3" fill="#2ec868"/>
  <circle cx="14" cy="16" r="1.5" fill="#9ef0b8"/>
</svg>
