<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <radialGradient id="body" cx="42%" cy="34%" r="62%">
      <stop offset="0%" stop-color="#5a5a70"/>
      <stop offset="45%" stop-color="#323240"/>
      <stop offset="100%" stop-color="#16161c"/>
    </radialGradient>
    <linearGradient id="rim" x1="20" y1="12" x2="108" y2="116" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6a6a80"/>
      <stop offset="0.5" stop-color="#2c2c38"/>
      <stop offset="1" stop-color="#4a4a5c"/>
    </linearGradient>
    <radialGradient id="shine" cx="38%" cy="28%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <!-- outer bezel -->
  <circle cx="64" cy="64" r="58" fill="url(#rim)" filter="url(#soft)"/>
  <circle cx="64" cy="64" r="54" fill="#1a1a22" stroke="#3a3a48" stroke-width="1"/>
  <!-- face -->
  <circle cx="64" cy="64" r="46" fill="url(#body)"/>
  <circle cx="64" cy="64" r="46" fill="url(#shine)"/>
  <circle cx="64" cy="64" r="46" stroke="#0c0c10" stroke-width="1.5" opacity="0.5"/>
  <!-- concentric rings -->
  <circle cx="64" cy="64" r="38" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <circle cx="64" cy="64" r="28" stroke="#000000" stroke-opacity="0.25" stroke-width="1"/>
  <!-- pointer at 12 o'clock (neutral mid) -->
  <rect x="61.2" y="24" width="5.6" height="22" rx="2.8" fill="#ff8850"/>
  <rect x="62" y="25" width="4" height="12" rx="2" fill="#ffc4a0" opacity="0.55"/>
  <!-- center hub -->
  <circle cx="64" cy="64" r="8" fill="#121218" stroke="#4a4a5c" stroke-width="1"/>
  <circle cx="64" cy="64" r="3" fill="#2a2a34"/>
</svg>
