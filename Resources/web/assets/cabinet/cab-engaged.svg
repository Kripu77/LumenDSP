<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <radialGradient id="orb" cx="40%" cy="35%" r="60%">
      <stop stop-color="#ffd0a0"/>
      <stop offset="0.45" stop-color="#ff8850"/>
      <stop offset="1" stop-color="#c05020"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="16" cy="16" r="13" fill="#1a120e" stroke="#ff8850" stroke-opacity="0.35" stroke-width="1"/>
  <g filter="url(#glow)">
    <circle cx="16" cy="16" r="9" fill="url(#orb)"/>
    <!-- power symbol -->
    <path d="M16 10v7" stroke="#fff8f0" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M11.2 12.2a6.2 6.2 0 1 0 9.6 0" stroke="#fff8f0" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  </g>
  <circle cx="13" cy="12" r="2.2" fill="#ffffff" fill-opacity="0.35"/>
</svg>
