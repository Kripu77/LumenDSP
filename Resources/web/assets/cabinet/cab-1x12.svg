<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="tolex" x1="40" y1="30" x2="360" y2="370" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3e3832"/>
      <stop offset="0.5" stop-color="#242018"/>
      <stop offset="1" stop-color="#14120e"/>
    </linearGradient>
    <radialGradient id="cone" cx="48%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#5a5a66"/>
      <stop offset="35%" stop-color="#34343e"/>
      <stop offset="70%" stop-color="#1c1c24"/>
      <stop offset="100%" stop-color="#0e0e14"/>
    </radialGradient>
    <radialGradient id="dust" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#3a3a44"/>
      <stop offset="100%" stop-color="#121218"/>
    </radialGradient>
    <filter id="shadow" x="-12%" y="-8%" width="124%" height="124%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <!-- subtle tolex grain via pattern -->
    <pattern id="grain" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.6" fill="#ffffff" fill-opacity="0.03"/>
      <circle cx="5" cy="4" r="0.5" fill="#ffffff" fill-opacity="0.025"/>
      <circle cx="3" cy="7" r="0.4" fill="#000000" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <g filter="url(#shadow)">
    <!-- cabinet body -->
    <rect x="36" y="40" width="328" height="300" rx="14" fill="url(#tolex)" stroke="#4a4038" stroke-width="1.5"/>
    <rect x="36" y="40" width="328" height="300" rx="14" fill="url(#grain)"/>

    <!-- front baffle recess -->
    <rect x="58" y="62" width="284" height="236" rx="8" fill="#0a0a0e" stroke="#2a2420" stroke-width="1"/>
    <rect x="68" y="72" width="264" height="216" rx="6" fill="#121014"/>

    <!-- speaker -->
    <circle cx="200" cy="180" r="96" fill="#1a1a20" stroke="#3a3a44" stroke-width="3"/>
    <circle cx="200" cy="180" r="88" fill="url(#cone)"/>
    <!-- cone rings -->
    <circle cx="200" cy="180" r="72" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" fill="none"/>
    <circle cx="200" cy="180" r="56" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" fill="none"/>
    <circle cx="200" cy="180" r="40" stroke="#000000" stroke-opacity="0.25" stroke-width="1" fill="none"/>
    <!-- dust cap -->
    <circle cx="200" cy="180" r="22" fill="url(#dust)" stroke="#2a2a34" stroke-width="1"/>
    <circle cx="200" cy="180" r="10" fill="#0e0e12"/>

    <!-- mounting screws around speaker -->
    <g fill="#3a3a44">
      <circle cx="120" cy="100" r="3.5"/>
      <circle cx="280" cy="100" r="3.5"/>
      <circle cx="120" cy="260" r="3.5"/>
      <circle cx="280" cy="260" r="3.5"/>
    </g>

    <!-- metal corners -->
    <g fill="#5a5a68" opacity="0.85">
      <path d="M36 54v-4c0-5.5 4.5-10 10-10h4v8h-6c-2.2 0-4 1.8-4 4v2h-4z"/>
      <path d="M364 54v-4c0-5.5-4.5-10-10-10h-4v8h6c2.2 0 4 1.8 4 4v2h4z"/>
      <path d="M36 326v4c0 5.5 4.5 10 10 10h4v-8h-6c-2.2 0-4-1.8-4-4v-2h-4z"/>
      <path d="M364 326v4c0 5.5-4.5 10-10 10h-4v-8h6c2.2 0 4-1.8 4-4v-2h4z"/>
    </g>

    <!-- badge -->
    <rect x="168" y="300" width="64" height="16" rx="2" fill="#2a2a34" stroke="#5a5a68" stroke-width="0.8"/>
    <text x="200" y="311" text-anchor="middle" fill="#8e8ea4" font-family="system-ui,Segoe UI,sans-serif" font-size="8" font-weight="700" letter-spacing="0.15em">LUMEN</text>
  </g>

  <!-- feet -->
  <rect x="72" y="340" width="28" height="12" rx="3" fill="#1a1a20"/>
  <rect x="300" y="340" width="28" height="12" rx="3" fill="#1a1a20"/>
</svg>
